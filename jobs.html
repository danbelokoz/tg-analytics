<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Telemetria — лента вакансий</title>
<meta name="description" content="Живая лента вакансий из Telegram-каналов о работе с авто-тегами: роль, формат, грейд, стек." />
<link rel="stylesheet" href="fonts/manrope.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f7f8fa;color:#18181f;font-family:'Manrope',sans-serif;-webkit-font-smoothing:antialiased}
.wrap{max-width:820px;margin:0 auto;padding:0 28px}
a{color:inherit}

/* Header */
header{background:rgba(255,255,255,.85);backdrop-filter:blur(10px);border-bottom:1px solid #e9eaf0;position:sticky;top:0;z-index:10}
.nav{display:flex;align-items:center;gap:26px;height:60px;max-width:1120px;margin:0 auto;padding:0 28px}
.logo{display:flex;align-items:center;gap:9px;font-weight:800;font-size:16px;text-decoration:none}
.logo i{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,#2AABEE,#6366f1);display:inline-flex;align-items:center;justify-content:center;font-style:normal;color:#fff;font-size:13px}
.nav a.tab{font-weight:700;color:#6b6f7e;font-size:13.5px;text-decoration:none;transition:.15s}
.nav a.tab:hover{color:#18181f}
.nav a.tab.active{font-weight:800;color:#18181f}

/* Hero */
.hero{padding:48px 0 6px}
h1{font-size:clamp(26px,4vw,36px);font-weight:800;letter-spacing:-.02em}
.sub{color:#6b6f7e;font-size:15px;margin-top:8px;line-height:1.6}

/* Toolbar */
.toolbar{padding:24px 0 4px}
.search{position:relative}
.search input{width:100%;padding:11px 14px 11px 40px;border:1px solid #e9eaf0;border-radius:999px;background:#fff;font:600 14px 'Manrope';color:#18181f;outline:none;transition:.15s}
.search input:focus{border-color:#2AABEE;box-shadow:0 0 0 3px rgba(42,171,238,.15)}
.search svg{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:#9095a5}
.filters{display:flex;gap:7px;padding:14px 0 6px;flex-wrap:wrap}
.chip{padding:6px 13px;border-radius:999px;border:1px solid #e9eaf0;background:#fff;font:700 12.5px 'Manrope';color:#6b6f7e;cursor:pointer;transition:.15s;white-space:nowrap}
.chip:hover{border-color:#c7cad6}
.chip.on{background:#18181f;border-color:#18181f;color:#fff}
.chip.clear{color:#dc2626;border-color:#f3d0d0}
.count{color:#9095a5;font-size:13px;font-weight:700;padding:8px 0 0}

/* Feed */
.feed{display:flex;flex-direction:column;gap:12px;padding:14px 0 40px}
.post{background:#fff;border:1px solid #e9eaf0;border-radius:16px;padding:18px 20px;box-shadow:0 1px 2px rgba(24,24,31,.04);transition:.15s;text-decoration:none;color:inherit;display:block}
.post:hover{border-color:#d9dce6;box-shadow:0 8px 22px rgba(24,24,31,.07)}
.phead{display:flex;align-items:center;gap:11px}
.ava{position:relative;overflow:hidden;width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;flex-shrink:0}
.avimg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.phead .t{font-weight:800;font-size:14px;line-height:1.2}
.phead .c{font-size:12px;color:#9095a5;font-weight:600;margin-top:2px}
.phead .meta{margin-left:auto;text-align:right;font-size:12px;color:#9095a5;font-weight:600;flex-shrink:0}
.ptext{margin:13px 0 0;font-size:14px;line-height:1.55;color:#31323c;white-space:pre-wrap;
  display:-webkit-box;-webkit-line-clamp:6;-webkit-box-orient:vertical;overflow:hidden}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:13px}
.tag{font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:7px;background:#eef1f6;color:#4a4d5a}
.tag.role{background:#eaf5ff;color:#1573c4}
.tag.fmt{background:#ecfdf5;color:#059669}
.tag.grade{background:#fff5e9;color:#c2760a}
.tag.pay{background:#f3ecff;color:#7c3aed}
.tag.digest{background:#18181f;color:#fff}

.state{padding:60px 20px;text-align:center;color:#9095a5;font-weight:600;font-size:15px}
footer{padding:40px 0 24px;color:#9095a5;font-size:13px;font-weight:600}
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute"><defs><linearGradient id="g2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2AABEE" stop-opacity=".25"/><stop offset="100%" stop-color="#2AABEE" stop-opacity="0"/></linearGradient></defs></svg>

<header><div class="nav">
  <a class="logo" href="index.html"><i>✈</i>Telemetria</a>
  <a class="tab" href="index.html">Каталог</a>
  <a class="tab active" href="jobs.html">Лента вакансий</a>
</div></header>

<div class="wrap">
  <div class="hero">
    <h1>Лента вакансий</h1>
    <p class="sub">Свежие вакансии из Telegram-каналов о работе. Теги проставляются автоматически по тексту — фильтруй по роли, формату и грейду.</p>
  </div>

  <div class="toolbar">
    <div class="search">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="q" placeholder="Поиск по тексту вакансии…" />
    </div>
    <div class="filters" id="filters"></div>
    <div class="count" id="count"></div>
  </div>

  <div class="feed" id="feed"></div>
  <div class="state" id="state">Загрузка…</div>

  <footer>Telemetria © 2026 · Вакансии собираются со страниц t.me · обновление каждые 3 часа</footer>
</div>

<script>
// Данные грузятся статическим JSON с нашего домена (data/job_feed.json),
// не запросом в Supabase — чтобы сайт открывался в РФ без VPN (см. PROJECT.md).
// JSON обновляет CI после скрейпа.

// классификация тегов по группам (для цвета чипа)
const ROLE = new Set(["Frontend","Backend","Fullstack","Mobile","DevOps","QA","Data/ML","Аналитик","Design","Product","Project","Marketing","Sales","HR","Management","Support"]);
const FMT  = new Set(["Удалёнка","Гибрид","Офис","Релокация"]);
const GRADE= new Set(["Junior","Middle","Senior","Lead"]);
const tagClass = t => t==="Дайджест" ? "digest" : t==="З/п указана" ? "pay" : ROLE.has(t)?"role" : FMT.has(t)?"fmt" : GRADE.has(t)?"grade" : "";

let data = [], active = new Set();

const esc = s => String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const compact = n => n==null ? "" : Intl.NumberFormat("en",{notation:"compact",maximumFractionDigits:1}).format(n).replace(".",",");
const hueOf = s => { let h=0; for(const c of (s||"")) h=(h*31+c.charCodeAt(0))%360; return h; };

function timeAgo(iso){
  if(!iso) return "";
  const s=(Date.now()-new Date(iso))/1000;
  if(s<3600) return Math.max(1,Math.floor(s/60))+" мин";
  if(s<86400) return Math.floor(s/3600)+" ч";
  const d=Math.floor(s/86400);
  if(d<30) return d+" дн";
  return new Date(iso).toLocaleDateString("ru",{day:"numeric",month:"short"});
}
function avatar(c){
  const name=c.channel_title||c.username||"?";
  const initial=esc(name.trim().charAt(0).toUpperCase());
  const bg=`hsl(${hueOf(c.username)} 48% 50%)`;
  // Буква рисуется всегда; фото Telegram (cdn telesco.pe) кладём поверх <img>.
  // onerror убирает картинку → если CDN недоступен в РФ, остаётся цветной кружок
  // с буквой вместо битого квадрата (см. PROJECT.md «Доступность в РФ»).
  const img=c.channel_photo?`<img class="avimg" src="${esc(c.channel_photo)}" alt="" loading="lazy" onerror="this.remove()">`:"";
  return `<div class="ava" style="background:${bg}">${initial}${img}</div>`;
}

// самые частые теги → чипы фильтра
function renderFilters(){
  const freq={};
  data.forEach(p=>(p.tags||[]).forEach(t=>freq[t]=(freq[t]||0)+1));
  const top=Object.keys(freq).sort((a,b)=>freq[b]-freq[a]).slice(0,18);
  const el=document.getElementById("filters");
  const chips=top.map(t=>`<button class="chip ${active.has(t)?"on":""}" data-t="${esc(t)}">${esc(t)}</button>`);
  if(active.size) chips.push(`<button class="chip clear" data-clear="1">× сбросить</button>`);
  el.innerHTML=chips.join("");
  el.querySelectorAll(".chip").forEach(b=>b.onclick=()=>{
    if(b.dataset.clear){ active.clear(); }
    else { const t=b.dataset.t; active.has(t)?active.delete(t):active.add(t); }
    renderFilters(); renderFeed();
  });
}

function renderFeed(){
  const term=document.getElementById("q").value.trim().toLowerCase();
  const list=data
    .filter(p=> [...active].every(t=>(p.tags||[]).includes(t)))  // все выбранные теги (AND)
    .filter(p=> !term || (p.text||"").toLowerCase().includes(term) || (p.channel_title||"").toLowerCase().includes(term));

  document.getElementById("count").textContent = `${list.length} ${plural(list.length,"вакансия","вакансии","вакансий")}`;
  const feed=document.getElementById("feed"), state=document.getElementById("state");
  if(!list.length){
    feed.innerHTML=""; state.hidden=false;
    state.textContent = data.length ? "Ничего не найдено по фильтрам." : "Пока нет вакансий — скрейпер соберёт их при ближайшем запуске.";
    return;
  }
  state.hidden=true;
  feed.innerHTML=list.map(p=>{
    const tags=(p.tags||[]).map(t=>`<span class="tag ${tagClass(t)}">${esc(t)}</span>`).join("");
    const views=p.views!=null?`${compact(p.views)} 👁`:"";
    return `<a class="post" href="${esc(p.link)}" target="_blank" rel="noopener">
      <div class="phead">${avatar(p)}
        <div><div class="t">${esc(p.channel_title||p.username)}</div><div class="c">@${esc(p.username)}</div></div>
        <div class="meta">${timeAgo(p.posted_at)}<br>${views}</div>
      </div>
      <div class="ptext">${esc(p.text)}</div>
      ${tags?`<div class="tags">${tags}</div>`:""}
    </a>`;
  }).join("");
}
const plural=(n,one,few,many)=>{const m=n%100,d=n%10;return(m>=11&&m<=14)?many:d===1?one:(d>=2&&d<=4)?few:many;};

async function load(){
  const state=document.getElementById("state");
  try{
    const r=await fetch("data/job_feed.json",{cache:"no-cache"});
    if(!r.ok) throw new Error(r.status+" "+(await r.text()).slice(0,120));
    data=await r.json();
    renderFilters(); renderFeed();
  }catch(e){ state.hidden=false; state.textContent="Ошибка загрузки: "+e.message; }
}
document.getElementById("q").addEventListener("input", renderFeed);
load();
</script>
</body>
</html>
