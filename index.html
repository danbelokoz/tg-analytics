<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TG Analytics — статистика Telegram-каналов</title>
  <style>
    :root{
      --bg:#0a0b0d; --surface:#131519; --surface-2:#181b20; --line:#23262d;
      --fg:#e7e9ec; --muted:#8a909a; --faint:#5b616b;
      --accent:#229ED9; --accent-2:#1b8ac0;
      --green:#22c55e; --red:#ef4444; --amber:#f59e0b;
      --radius:16px; --radius-sm:10px;
      font-synthesis:none;
    }
    *{box-sizing:border-box;}
    html,body{margin:0;background:var(--bg);color:var(--fg);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      -webkit-font-smoothing:antialiased;}
    body{background:
      radial-gradient(1200px 600px at 80% -10%, rgba(34,158,217,.08), transparent 60%),
      radial-gradient(900px 500px at 0% 0%, rgba(34,158,217,.05), transparent 55%),
      var(--bg);
      min-height:100vh;}
    .wrap{max-width:1100px;margin:0 auto;padding:28px 20px 80px;}

    /* Top bar */
    .top{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:24px;}
    .brand{display:flex;align-items:center;gap:12px;}
    .logo{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;
      background:linear-gradient(135deg,var(--accent),#1466a0);box-shadow:0 6px 20px rgba(34,158,217,.35);
      font-size:22px;}
    .brand h1{margin:0;font-size:20px;font-weight:700;letter-spacing:-.01em;}
    .brand p{margin:2px 0 0;font-size:12.5px;color:var(--muted);}
    .btn{appearance:none;border:0;cursor:pointer;font:inherit;font-weight:600;
      padding:11px 18px;border-radius:12px;color:#fff;
      background:linear-gradient(135deg,var(--accent),var(--accent-2));
      box-shadow:0 6px 18px rgba(34,158,217,.3);transition:transform .12s ease,box-shadow .12s ease;}
    .btn:hover{transform:translateY(-1px);box-shadow:0 9px 24px rgba(34,158,217,.42);}
    .btn:active{transform:translateY(0);}
    .btn-ghost{background:var(--surface-2);border:1px solid var(--line);color:var(--fg);box-shadow:none;}
    .btn-ghost:hover{background:#1f232a;box-shadow:none;}

    /* Stats */
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px;}
    .stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;}
    .stat .k{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
    .stat .v{font-size:26px;font-weight:700;margin-top:6px;letter-spacing:-.02em;font-variant-numeric:tabular-nums;}
    .stat .s{font-size:12px;color:var(--faint);margin-top:2px;}

    /* Search */
    .search{position:relative;margin-bottom:14px;}
    .search input{width:100%;padding:13px 16px 13px 44px;background:var(--surface);
      border:1px solid var(--line);border-radius:14px;color:var(--fg);font-size:15px;outline:none;
      transition:border-color .15s ease,box-shadow .15s ease;}
    .search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(34,158,217,.15);}
    .search svg{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--faint);}

    /* Table card */
    .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
    table{width:100%;border-collapse:collapse;}
    thead th{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;
      text-align:right;padding:14px 16px;font-weight:600;cursor:pointer;user-select:none;white-space:nowrap;
      border-bottom:1px solid var(--line);background:var(--surface-2);}
    thead th:first-child{text-align:left;}
    thead th .arrow{opacity:0;margin-left:4px;font-size:9px;}
    thead th.sorted .arrow{opacity:1;}
    tbody td{padding:14px 16px;border-bottom:1px solid var(--line);text-align:right;
      font-variant-numeric:tabular-nums;font-size:15px;white-space:nowrap;}
    tbody tr:last-child td{border-bottom:0;}
    tbody td:first-child{text-align:left;}
    tbody tr{transition:background .12s ease;}
    tbody tr:hover{background:var(--surface-2);}

    .ch{display:flex;align-items:center;gap:12px;}
    .ava{width:38px;height:38px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;
      font-weight:700;font-size:15px;color:#fff;}
    .ch a{color:var(--fg);text-decoration:none;font-weight:600;}
    .ch .u{display:block;color:var(--muted);font-weight:400;font-size:12.5px;margin-top:1px;}
    .ch a:hover{color:var(--accent);}

    .badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:12.5px;font-weight:600;}
    .up{background:rgba(34,197,94,.14);color:#5fe39a;}
    .down{background:rgba(239,68,68,.14);color:#ff8585;}
    .flat{color:var(--faint);}
    .er-hi{background:rgba(34,197,94,.14);color:#5fe39a;}
    .er-mid{background:rgba(34,158,217,.16);color:#6fc6ec;}
    .er-lo{background:rgba(138,144,154,.14);color:var(--muted);}

    .muted{color:var(--faint);}
    .state{padding:48px 20px;text-align:center;color:var(--muted);}

    /* Modal */
    .overlay{position:fixed;inset:0;background:rgba(5,6,8,.66);backdrop-filter:blur(4px);
      display:none;align-items:center;justify-content:center;padding:20px;z-index:50;}
    .overlay.open{display:flex;}
    .modal{width:100%;max-width:440px;background:var(--surface);border:1px solid var(--line);
      border-radius:20px;padding:24px;box-shadow:0 30px 80px rgba(0,0,0,.6);}
    .modal h2{margin:0 0 4px;font-size:18px;}
    .modal p{margin:0 0 18px;color:var(--muted);font-size:13px;}
    .modal label{display:block;font-size:12.5px;color:var(--muted);margin:14px 0 6px;}
    .modal input{width:100%;padding:12px 14px;background:var(--surface-2);border:1px solid var(--line);
      border-radius:12px;color:var(--fg);font-size:15px;outline:none;}
    .modal input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(34,158,217,.15);}
    .modal .row{display:flex;gap:10px;margin-top:22px;}
    .modal .row .btn{flex:1;text-align:center;}
    .msg{font-size:13px;margin-top:14px;min-height:18px;}
    .msg.ok{color:#5fe39a;} .msg.err{color:#ff8585;}

    @media(max-width:640px){
      .stats{grid-template-columns:1fr;}
      .hide-sm{display:none;}
      .stat .v{font-size:22px;}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <div class="logo">📊</div>
        <div>
          <h1>TG Analytics</h1>
          <p>Статистика публичных Telegram-каналов · обновляется каждые 6 часов</p>
        </div>
      </div>
      <button class="btn" id="addBtn">＋ Добавить канал</button>
    </div>

    <div class="stats" id="stats"></div>

    <div class="search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="q" placeholder="Поиск по каналу…" />
    </div>

    <div class="card">
      <table id="tbl" hidden>
        <thead>
          <tr>
            <th data-k="title">Канал</th>
            <th data-k="subscribers" class="sorted">Подписчики <span class="arrow">▼</span></th>
            <th data-k="growth_7d">Рост 7д <span class="arrow">▼</span></th>
            <th data-k="avg_views" class="hide-sm">Ср. охват <span class="arrow">▼</span></th>
            <th data-k="err_pct">ER <span class="arrow">▼</span></th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
      <div id="state" class="state">Загрузка…</div>
    </div>
  </div>

  <!-- Add modal -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <h2>Добавить канал</h2>
      <p>Появится в списке после ближайшего сбора (до 6 ч) или ручного запуска парсера.</p>
      <label>Канал — @username или ссылка t.me</label>
      <input id="mUser" placeholder="@durov или https://t.me/durov" autocomplete="off" />
      <label>Ключ доступа</label>
      <input id="mKey" type="password" placeholder="ADMIN_KEY (запомнится в этом браузере)" />
      <div class="msg" id="mMsg"></div>
      <div class="row">
        <button class="btn-ghost btn" id="mCancel">Отмена</button>
        <button class="btn" id="mAdd">Добавить</button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://jaqhstbeelzciburiqyt.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImphcWhzdGJlZWx6Y2lidXJpcXl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMDg3ODcsImV4cCI6MjA5NTg4NDc4N30.RJ9khzIXvNUaxCw8bu-pF8Ye3_8boGCz3vvgUUO_q1E";

    let data = [], sortKey = "subscribers", sortDesc = true;

    const fmtFull = n => n==null ? "—" : Intl.NumberFormat("ru").format(n);
    const compact = n => n==null ? "—" : Intl.NumberFormat("en",{notation:"compact",maximumFractionDigits:1}).format(n);
    const hueOf = s => { let h=0; for(const c of (s||"")) h=(h*31+c.charCodeAt(0))%360; return h; };

    function growthBadge(n){
      if(n==null) return '<span class="flat">—</span>';
      if(n===0) return '<span class="flat">0</span>';
      const cls = n>0?"up":"down", sign = n>0?"+":"−";
      return `<span class="badge ${cls}">${sign}${compact(Math.abs(n))}</span>`;
    }
    function erBadge(v){
      if(v==null) return '<span class="flat">—</span>';
      const cls = v>=30?"er-hi":v>=8?"er-mid":"er-lo";
      return `<span class="badge ${cls}">${v}%</span>`;
    }

    async function load(){
      try{
        const r = await fetch(`${SUPABASE_URL}/rest/v1/channel_latest?select=*&order=subscribers.desc.nullslast`,{
          headers:{ apikey:SUPABASE_ANON_KEY, Authorization:"Bearer "+SUPABASE_ANON_KEY }
        });
        if(!r.ok) throw new Error(r.status+" "+(await r.text()).slice(0,120));
        data = await r.json();
        renderStats();
        if(!data.length){ state.textContent = "Пока нет данных. Нажми «Добавить канал» или запусти парсер."; tbl.hidden=true; state.hidden=false; return; }
        state.hidden = true; tbl.hidden = false; render();
      }catch(e){
        state.textContent = "Ошибка загрузки: "+e.message;
      }
    }

    function renderStats(){
      const totalSubs = data.reduce((s,c)=>s+(c.subscribers||0),0);
      const last = data.map(c=>c.snapshot_date).filter(Boolean).sort().pop();
      stats.innerHTML = `
        <div class="stat"><div class="k">Каналов</div><div class="v">${data.length}</div><div class="s">отслеживается</div></div>
        <div class="stat"><div class="k">Суммарно подписчиков</div><div class="v">${compact(totalSubs)}</div><div class="s">${fmtFull(totalSubs)}</div></div>
        <div class="stat"><div class="k">Последний сбор</div><div class="v" style="font-size:20px">${last||"—"}</div><div class="s">обновление каждые 6 ч</div></div>`;
    }

    function render(){
      const term = q.value.trim().toLowerCase();
      const list = data
        .filter(c=>!term || (c.title||"").toLowerCase().includes(term) || (c.username||"").toLowerCase().includes(term))
        .sort((a,b)=>{
          const av=a[sortKey]??-Infinity, bv=b[sortKey]??-Infinity;
          return sortDesc ? bv-av : av-bv;
        });
      rows.innerHTML = list.map(c=>{
        const name = c.title || c.username;
        const initial = (name||"?").trim().charAt(0).toUpperCase();
        const hue = hueOf(c.username);
        return `<tr>
          <td><div class="ch">
            <div class="ava" style="background:hsl(${hue} 48% 42%)">${initial}</div>
            <div><a href="https://t.me/${c.username}" target="_blank" rel="noopener">${name}</a>
              <span class="u">@${c.username}</span></div>
          </div></td>
          <td title="${fmtFull(c.subscribers)}">${compact(c.subscribers)}</td>
          <td>${growthBadge(c.growth_7d)}</td>
          <td class="hide-sm" title="${fmtFull(c.avg_views)}">${compact(c.avg_views)}</td>
          <td>${erBadge(c.err_pct)}</td>
        </tr>`;
      }).join("");
      document.querySelectorAll("thead th").forEach(th=>{
        th.classList.toggle("sorted", th.dataset.k===sortKey);
        const a=th.querySelector(".arrow"); if(a) a.textContent = sortDesc?"▼":"▲";
      });
    }

    // elements
    const q=document.getElementById("q"), rows=document.getElementById("rows");
    const tbl=document.getElementById("tbl"), state=document.getElementById("state"), stats=document.getElementById("stats");
    q.addEventListener("input", render);
    document.querySelectorAll("thead th").forEach(th=>th.addEventListener("click",()=>{
      const k=th.dataset.k; if(!k) return;
      if(sortKey===k) sortDesc=!sortDesc; else { sortKey=k; sortDesc=true; }
      render();
    }));

    // modal
    const overlay=document.getElementById("overlay");
    const mUser=document.getElementById("mUser"), mKey=document.getElementById("mKey"), mMsg=document.getElementById("mMsg");
    document.getElementById("addBtn").onclick=()=>{ mKey.value=localStorage.getItem("tg_admin_key")||""; mMsg.textContent=""; mMsg.className="msg"; overlay.classList.add("open"); mUser.focus(); };
    document.getElementById("mCancel").onclick=()=>overlay.classList.remove("open");
    overlay.addEventListener("click",e=>{ if(e.target===overlay) overlay.classList.remove("open"); });

    document.getElementById("mAdd").onclick=async ()=>{
      const username=mUser.value.trim(), key=mKey.value.trim();
      if(!username){ mMsg.className="msg err"; mMsg.textContent="Укажи канал."; return; }
      if(!key){ mMsg.className="msg err"; mMsg.textContent="Нужен ключ доступа (ADMIN_KEY)."; return; }
      mMsg.className="msg"; mMsg.textContent="Добавляю…";
      try{
        const r=await fetch("/api/add-channel",{ method:"POST", headers:{"Content-Type":"application/json"},
          body:JSON.stringify({username,key}) });
        const j=await r.json().catch(()=>({}));
        if(!r.ok) throw new Error(j.error||r.status);
        localStorage.setItem("tg_admin_key",key);
        mMsg.className="msg ok"; mMsg.textContent=`✅ @${j.username} добавлен. Появится после ближайшего сбора.`;
        mUser.value="";
      }catch(e){
        mMsg.className="msg err";
        mMsg.textContent = (""+e.message).includes("Failed to fetch")
          ? "Эндпоинт /api/add-channel доступен только на Vercel (не в локальном превью)."
          : "Ошибка: "+e.message;
      }
    };

    load();
  </script>
</body>
</html>
