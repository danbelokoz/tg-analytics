<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Вход — Telemetria</title>
<meta name="robots" content="noindex" />
<link rel="stylesheet" href="fonts/manrope.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f4f5f7;--card:#fff;--ink:#18181f;--muted:#6b6f7e;--line:#ececf0;--accent:#1573c4;--err:#c0392b}
body{background:var(--bg);color:var(--ink);font-family:'Manrope',system-ui,sans-serif;-webkit-font-smoothing:antialiased;
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:32px 30px;width:100%;max-width:400px;
  box-shadow:0 8px 30px rgba(24,24,31,.06)}
.brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:17px;margin-bottom:6px}
.brand i{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,#2AABEE,#6366f1);display:inline-flex;
  align-items:center;justify-content:center;font-style:normal;color:#fff;font-size:13px}
h1{font-size:21px;font-weight:800;letter-spacing:-.02em;margin:14px 0 4px}
.sub{color:var(--muted);font-size:13.5px;margin-bottom:20px}
label{display:block;font-size:12.5px;font-weight:700;color:var(--muted);margin:14px 0 6px}
input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:11px;font:600 14px 'Manrope';
  color:var(--ink);outline:none;transition:.13s;background:var(--card)}
input:focus{border-color:var(--accent)}
button.submit{width:100%;margin-top:22px;padding:13px;border:none;border-radius:12px;background:var(--ink);color:#fff;
  font:800 14px 'Manrope';cursor:pointer;transition:.15s}
button.submit:hover{background:#2b2b36}
button.submit:disabled{opacity:.55;cursor:default}
.toggle{margin-top:18px;text-align:center;font-size:13px;color:var(--muted)}
.toggle a{color:var(--accent);font-weight:700;cursor:pointer;text-decoration:none}
.msg{margin-top:14px;font-size:13px;font-weight:600;padding:10px 12px;border-radius:10px;display:none}
.msg.err{display:block;background:#fdecea;color:var(--err)}
.msg.ok{display:block;background:#e7f7ec;color:#137a3a}
</style>
</head>
<body>
<div class="card">
  <div class="brand"><i>◈</i> Telemetria</div>
  <h1 id="ttl">Вход</h1>
  <div class="sub" id="sub">Войдите в аккаунт, чтобы продолжить.</div>

  <form id="form">
    <label for="email">E-mail</label>
    <input id="email" type="email" autocomplete="email" placeholder="you@example.com" required>
    <label for="password">Пароль</label>
    <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" required>
    <button class="submit" id="btn" type="submit">Войти</button>
  </form>

  <div class="msg" id="msg"></div>
  <div class="toggle" id="toggle">Нет аккаунта? <a id="switch">Зарегистрироваться</a></div>
</div>

<script>
let mode = "login";
const $ = (id) => document.getElementById(id);
const msg = (text, kind) => { const m = $("msg"); m.textContent = text; m.className = "msg " + kind; };

function applyMode() {
  const login = mode === "login";
  $("ttl").textContent = login ? "Вход" : "Регистрация";
  $("sub").textContent = login ? "Войдите в аккаунт, чтобы продолжить." : "Создайте аккаунт — займёт минуту.";
  $("btn").textContent = login ? "Войти" : "Создать аккаунт";
  $("password").autocomplete = login ? "current-password" : "new-password";
  $("toggle").innerHTML = login
    ? 'Нет аккаунта? <a id="switch">Зарегистрироваться</a>'
    : 'Уже есть аккаунт? <a id="switch">Войти</a>';
  $("switch").onclick = () => { mode = login ? "register" : "login"; $("msg").className = "msg"; applyMode(); };
}
applyMode();

$("form").addEventListener("submit", async (e) => {
  e.preventDefault();
  $("btn").disabled = true;
  msg("", "");
  try {
    const r = await fetch("/api/" + mode, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: $("email").value, password: $("password").value }),
    });
    const data = await r.json();
    if (!r.ok) { msg(data.error || "Ошибка", "err"); return; }
    msg("Готово, перенаправляем…", "ok");
    location.href = data.role === "admin" ? "/admin" : "/";
  } catch {
    msg("Сеть недоступна, попробуйте ещё раз", "err");
  } finally {
    $("btn").disabled = false;
  }
});
</script>
</body>
</html>
