name: Jobs — company sites (twice a day)

on:
  push:
    branches: [main]
    paths:
      - "parser/scrape_ats.py"
      - "parser/companies_ats.json"
      - ".github/workflows/sites.yml"
  # Вакансии career-сайтов не меняются часто — двух прогонов в сутки достаточно.
  # GitHub-крон неточен по времени (может задержаться), но для 2×/сутки это ок,
  # внешний пингер здесь не нужен. Времена в UTC: 05:00 и 17:00 ≈ 08:00 и 20:00 МСК.
  schedule:
    - cron: "0 5,17 * * *"
  # Ручной запуск + запасной триггер через repository_dispatch (если захочешь пинговать
  # извне отдельно от TG-ленты).
  repository_dispatch:
    types: [scrape-sites]
  workflow_dispatch:

concurrency:
  group: company-sites
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write   # коммит обновлённого data/company_jobs.json обратно в репо
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: parser/requirements_analytics.txt

      - run: pip install -r parser/requirements_analytics.txt requests

      # Career-сайты компаний: тянем напрямую из публичных API их ATS
      # (Greenhouse/Lever/Ashby/Yandex/…) в data/company_jobs.json. Supabase не нужен —
      # это самодостаточный статический источник (см. parser/scrape_ats.py).
      - name: Scrape company career sites (ATS)
        env:
          # Только для записи статуса прогона в pipeline_runs (админ-дешборд).
          # Сам сбор вакансий Supabase не использует — это статический источник.
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python parser/scrape_ats.py

      - name: Commit data/ (triggers Vercel redeploy)
        run: bash .github/commit-data.sh
