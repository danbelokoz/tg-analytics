name: Analytics — subscriber snapshots

on:
  schedule:
    # раз в сутки в 05:23 UTC — не в :00, чтобы не попадать в пик крон-дропов GitHub
    - cron: "23 5 * * *"
  workflow_dispatch:
    inputs:
      seed_file:
        description: "Путь к файлу с @username (разово засидить каналы)"
        required: false
        default: ""

concurrency:
  group: tg-analytics
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r parser/requirements_analytics.txt requests

      - name: Scrape subscribers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SEED_FILE: ${{ github.event.inputs.seed_file }}
          CONCURRENCY: "8"
        run: python parser/scrape_subscribers.py
