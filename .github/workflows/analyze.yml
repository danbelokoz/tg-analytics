name: Analytics — subscriber snapshots

on:
  push:
    branches: [main]
    paths:
      - "parser/analytics_seed.txt"
      - "parser/scrape_subscribers.py"
      - ".github/workflows/analyze.yml"
  schedule:
    # раз в сутки в 05:23 UTC — не в :00, чтобы не попадать в пик крон-дропов GitHub
    - cron: "23 5 * * *"
  workflow_dispatch:
    inputs:
      seed_file:
        description: "Путь к файлу с @username (разово засидить каналы)"
        required: false
        default: "parser/analytics_seed.txt"

concurrency:
  group: tg-analytics
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write   # коммит обновлённых data/*.json обратно в репо
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: parser/requirements_analytics.txt

      - run: pip install -r parser/requirements_analytics.txt requests

      - name: Scrape subscribers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # сид-файл — источник правды: пере-засеваем и на расписании (upsert идемпотентен)
          SEED_FILE: ${{ github.event.inputs.seed_file || 'parser/analytics_seed.txt' }}
          CONCURRENCY: "8"
        run: python parser/scrape_subscribers.py

      - name: Export static JSON snapshots
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python parser/export_json.py

      - name: Commit data/ (triggers Vercel redeploy)
        run: bash .github/commit-data.sh
