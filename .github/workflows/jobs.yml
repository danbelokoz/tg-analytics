name: Jobs — vacancy feed

on:
  push:
    branches: [main]
    paths:
      - "parser/scrape_posts.py"
      - ".github/workflows/jobs.yml"
  schedule:
    # каждые 3 часа в :41 — посты вакансий обновляются часто
    - cron: "41 */3 * * *"
  workflow_dispatch:

concurrency:
  group: tg-jobs
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write   # коммит обновлённых data/*.json обратно в репо
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r parser/requirements_analytics.txt requests

      - name: Scrape job posts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CONCURRENCY: "8"
        run: python parser/scrape_posts.py

      - name: Export static JSON snapshots
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python parser/export_json.py

      - name: Commit data/ (triggers Vercel redeploy)
        run: bash .github/commit-data.sh
