name: Jobs — vacancy feed

on:
  push:
    branches: [main]
    paths:
      - "parser/scrape_posts.py"
      - "parser/scrape_ats.py"
      - "parser/companies_ats.json"
      - ".github/workflows/jobs.yml"
  # Основной планировщик — внешний пингер (cron-job.org) шлёт repository_dispatch
  # каждые 30 мин. Он бьёт по расписанию точно: API-запуск не попадает в очередь
  # события schedule, которую GitHub задерживает на 10–30+ мин (иногда часы).
  repository_dispatch:
    types: [scrape-jobs]
  # Запасной планировщик на случай, если внешний пингер отвалится. GitHub-крон
  # неточен по времени, но рано или поздно сработает.
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: tg-jobs
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write   # коммит обновлённых data/*.json обратно в репо
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: parser/requirements_analytics.txt

      - run: pip install -r parser/requirements_analytics.txt requests

      - name: Scrape job posts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CONCURRENCY: "8"
        run: python parser/scrape_posts.py

      - name: Export static JSON snapshots
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python parser/export_json.py

      # Career-сайты компаний: тянем напрямую из публичных API их ATS
      # (Greenhouse/Lever/Ashby/…) в data/company_jobs.json. Supabase не нужен —
      # это самодостаточный статический источник (см. parser/scrape_ats.py).
      - name: Scrape company career sites (ATS)
        run: python parser/scrape_ats.py

      - name: Commit data/ (triggers Vercel redeploy)
        run: bash .github/commit-data.sh
